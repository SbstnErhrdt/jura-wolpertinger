name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ubuntu-validation:
    name: Ubuntu install, checks, and authenticated web build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm run typecheck

      - name: Test
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm run build

      - name: Authenticated production web build
        env:
          VITE_JURA_REQUIRE_AUTH: '1'
          VITE_SUPABASE_URL: https://supabase.invalid
          VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
        run: corepack pnpm run build:web:production

      - name: Upload test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-test-results
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

  macos-e2e:
    name: macOS Electron E2E
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run Electron E2E
        run: corepack pnpm run test:e2e

      - name: Upload Playwright artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: macos-playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  windows-package:
    name: Windows dist directory smoke package
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build Windows dist directory
        run: corepack pnpm run dist:dir

      - name: Upload Windows package artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: windows-package-artifacts
          path: |
            release
            test-results
          if-no-files-found: ignore
