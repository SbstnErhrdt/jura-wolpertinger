name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to stage, for example 0.1.5
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stage:
    name: Stage ${{ matrix.target }} immutable candidate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            os: windows-latest
            build-command: corepack pnpm run release:win --x64
            stage-command: corepack pnpm run release:stage --platform windows-x64 --input release/${{ inputs.version }}
          - target: linux-x64
            os: ubuntu-latest
            build-command: corepack pnpm run release:linux --x64
            stage-command: corepack pnpm run release:stage --platform linux-x64 --input release/${{ inputs.version }}
          - target: mac-arm64
            os: macos-latest
            build-command: corepack pnpm run release:mac:arm64
            stage-command: corepack pnpm run release:stage --platform mac-arm64 --input release/${{ inputs.version }}
          - target: mac-x64
            os: macos-latest
            build-command: corepack pnpm run release:mac:x64
            stage-command: corepack pnpm run release:stage --platform mac-x64 --input release/${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Verify requested version matches package
        shell: bash
        run: node -e "const pkg=require('./package.json'); const expected=process.env.RELEASE_VERSION; if (pkg.version !== expected) { throw new Error(`workflow version ${expected} does not match package.json ${pkg.version}`); }"
        env:
          RELEASE_VERSION: ${{ inputs.version }}

      - name: Prepare macOS signing secrets
        if: ${{ startsWith(matrix.target, 'mac-') }}
        shell: bash
        env:
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_SECRET" > "$key_path"
          chmod 600 "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Build ${{ matrix.target }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          JURA_SYNC_SUPABASE_ANON_KEY: ${{ secrets.JURA_SYNC_SUPABASE_ANON_KEY }}
        run: ${{ matrix.build-command }}

      - name: Stage immutable RustFS release objects
        env:
          UPDATE_S3_ENDPOINT: ${{ secrets.UPDATE_S3_ENDPOINT }}
          UPDATE_S3_BUCKET: ${{ secrets.UPDATE_S3_BUCKET }}
          UPDATE_S3_ACCESS_KEY_ID: ${{ secrets.UPDATE_S3_ACCESS_KEY_ID }}
          UPDATE_S3_SECRET_ACCESS_KEY: ${{ secrets.UPDATE_S3_SECRET_ACCESS_KEY }}
          UPDATE_PUBLIC_BASE_URL: ${{ secrets.UPDATE_PUBLIC_BASE_URL }}
        run: ${{ matrix.stage-command }}

      - name: Upload release build artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}-failure-artifacts
          path: |
            release/${{ inputs.version }}
            test-results
          if-no-files-found: ignore
